<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paraglyph | Official Beats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- CORE STRESS FIXES --- */
        html, body {
            height: 100%; margin: 0; padding: 0;
            background-color: #0a0a0a; color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; /* Stops random horizontal swipes */
            scroll-snap-type: y mandatory;
        }
        section {
            scroll-snap-align: start; height: 100vh; width: 100vw;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }

        /* --- LOGO FIX: SCALE TO FIT --- */
        .logo-wrapper {
            position: relative; 
            width: 80vw; max-width: 500px; /* Responsive width */
            aspect-ratio: 1/1;
            margin: 0 auto;
        }
        .logo-image-bg { 
            position: absolute; inset: 0; 
            background: url('logo.png') center/contain no-repeat; 
            z-index: 1; 
        }
        .logo-mask {
            position: absolute; inset: 0;
            -webkit-mask: url('logo.png') center/contain no-repeat;
            mask: url('logo.png') center/contain no-repeat;
            z-index: 2;
        }
        .logo-shine-overlay {
            position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-25deg);
            animation: continuous-shine 4s infinite ease-in-out;
        }
        @keyframes continuous-shine { 0% { left: -150%; } 100% { left: 150%; } }
        
        .hero-content-block { transform: translateY(-20px); }
        .bio-text { position: relative; z-index: 10; margin-top: 10px; }

        /* --- REELS: STABLE SCROLLING --- */
        .reels-viewport {
            width: 100%; overflow-x: auto;
            scroll-snap-type: x mandatory;
            display: flex; gap: 40px;
            padding: 20px calc(50vw - 140px); /* Perfect centering */
            scrollbar-width: none; touch-action: pan-x; /* Force horizontal only inside here */
        }
        .reels-viewport::-webkit-scrollbar { display: none; }

        .reel-item { 
            scroll-snap-align: center; flex: 0 0 280px; 
            display: flex; flex-direction: column; align-items: center; 
            pointer-events: auto;
        }

        .reel-card { 
            width: 280px; aspect-ratio: 9/16; 
            background-color: #000; background-size: cover; background-position: center;
            border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); 
            position: relative; 
        }
        
        .reel-header { margin-bottom: 15px; text-align: center; height: 50px; }
        .reel-footer { margin-top: 15px; min-height: 60px; text-align: center; width: 300px; padding: 0 10px; }
        
        /* Popup Fix: No Chopping */
        .reel-popup { 
            font-size: 9px; color: #10b981; font-weight: 800; text-transform: uppercase; 
            background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 8px 12px; border-radius: 10px; line-height: 1.4;
            opacity: 0; transition: opacity 0.4s;
        }
        .video-moving + .reel-footer .reel-popup { opacity: 1; }

        .reel-card video { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; z-index: 5; }
        .video-moving video { opacity: 1; }

        /* Arrows pulsing */
        .swipe-arrow { position: absolute; top: 50%; opacity: 0.3; z-index: 50; pointer-events: none; }
        .arrow-left { left: 10px; animation: pulseL 2s infinite; }
        .arrow-right { right: 10px; animation: pulseR 2s infinite; }
        @keyframes pulseL { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-5px); } }
        @keyframes pulseR { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(5px); } }

        /* --- AUDIO PAGES --- */
        .beat-page { display: none; flex-direction: column; gap: 0.75rem; width: 100%; }
        .beat-page.active { display: flex; }
        .beat-card { 
            display: flex; flex-direction: column; width: 100%; 
            transition: all 0.3s ease; filter: brightness(0.9); 
            padding: 1.25rem; background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; 
        }
        .beat-card.active-track { filter: brightness(1.2); background: rgba(255, 255, 255, 0.08); border-color: rgba(255,255,255,0.2); }
        audio { width: 100%; filter: invert(100%) brightness(1.5); margin-top: 8px; }

        @media (min-width: 768px) {
            .reel-item { flex: 0 0 320px; }
            .reel-card { width: 320px; }
            audio { width: 350px; }
            .beat-card { flex-direction: row; flex-wrap: wrap; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <section>
        <div class="hero-content-block text-center">
            <div class="logo-wrapper">
                <div class="logo-image-bg"></div>
                <div class="logo-mask"><div class="logo-shine-overlay"></div></div>
            </div>
            <div class="bio-text px-6">
                <p class="text-gray-400 text-lg mb-4">Wavetable Synthesis Specialist 🔥</p>
                <button onclick="scrollToId('reels')" class="bg-white text-black px-8 py-3 rounded-full font-bold uppercase tracking-widest text-sm">View Reels</button>
            </div>
        </div>
    </section>

    <section id="reels">
        <div class="swipe-arrow arrow-left"><svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div class="swipe-arrow arrow-right"><svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>
        
        <h2 class="text-xl font-bold mb-4 uppercase tracking-tighter text-gray-500">Process</h2>
        <div class="reels-viewport" id="reels-list">
            </div>
    </section>

    <section id="player">
        <div class="glass p-6 rounded-[2.5rem] text-center w-[92%] max-w-4xl">
            <h2 class="text-xl font-bold mb-4 uppercase text-white">Latest Drops</h2>
            <div id="audio-pages-container">
                <div class="beat-page active" id="page-1">
                    <div class="beat-card" onclick="toggleAudio(this)">
                        <div class="text-left"><p class="font-bold text-white">Oseanslo</p><p class="text-[10px] text-gray-500">140 BPM - DARK TRAP</p></div>
                        <audio controls preload="metadata" onclick="event.stopPropagation()"><source src="https://www.dropbox.com/scl/fi/7lvw70kqbjlllw8113o6v/Oseanslo-UK-Drill-With-Hat-Movement-26-feb-26.wav?rlkey=wrak59iy3rbd6adv3u5laalo1&st=6j8ge1zf&raw=1" type="audio/mpeg"></audio>
                        <div class="condensed-popup w-full mt-2">⚡ Condensed Arrangement of the full beat: Intro, Drop, Bridge & Switch-ups in short. DM for full beat!</div>
                    </div>
                </div>
            </div>
            <div class="flex justify-center gap-4 mt-6">
                <button onclick="changeAudioPage(1)" class="bg-white/10 px-6 py-2 rounded-lg text-xs font-bold uppercase">Back</button>
                <button onclick="changeAudioPage(2)" class="bg-white/10 px-6 py-2 rounded-lg text-xs font-bold uppercase">Next</button>
            </div>
        </div>
    </section>

    <section>
        <div class="flex flex-col space-y-4 w-64">
            <a href="https://wa.me/917021539281" class="glass py-4 rounded-xl text-center font-bold uppercase tracking-widest hover:bg-white hover:text-black transition">WhatsApp</a>
            <a href="https://www.instagram.com/theparaglyph/" class="glass py-4 rounded-xl text-center font-bold uppercase tracking-widest hover:bg-white hover:text-black transition">Instagram</a>
        </div>
    </section>

    <script>
        function scrollToId(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }

        const reelData = [
            { title: 'Oseanslo', desc: 'Wavetable Texture', vid: 'Oseanslo4.mp4', thumb: 'Oseanslo4Thumbnail.jpg' },
            { title: 'Seegrande', desc: 'Orchestral Trap', vid: 'Seegrande4.mp4', thumb: 'Seegrande4Thumbnail.jpg' },
            { title: 'Glitchuck', desc: 'Granular Glitch', vid: 'Glitchuck4.mp4', thumb: 'Glitchuck4Thumbnail.jpg' }
        ];

        const list = document.getElementById('reels-list');
        // Infinite Loop Clone Logic (3x for safety)
        const full = [...reelData, ...reelData, ...reelData];
        
        list.innerHTML = full.map(d => `
            <div class="reel-item">
                <div class="reel-header"><div class="reel-title">${d.title}</div><div class="reel-desc">${d.desc}</div></div>
                <div class="reel-card" style="background-image:url('${d.thumb}')" onclick="toggleVideo(this)">
                    <video src="${d.vid}" loop muted playsinline></video>
                    <div class="video-ui"><div class="play-triangle"></div></div>
                </div>
                <div class="reel-footer"><div class="reel-popup">⚡ Fast-Load Preview: Audio compressed for performance. Swipe to the next page for higher audio quality.</div></div>
            </div>
        `).join('');

        // Infinite Loop Snap
        list.addEventListener('scroll', () => {
            const itemW = list.querySelector('.reel-item').offsetWidth + 40;
            if (list.scrollLeft < itemW) list.scrollLeft += itemW * reelData.length;
            if (list.scrollLeft > itemW * (reelData.length * 2)) list.scrollLeft -= itemW * reelData.length;
        });

        window.onload = () => {
            const itemW = list.querySelector('.reel-item').offsetWidth + 40;
            list.scrollLeft = itemW * reelData.length;
        };

        function toggleVideo(card) {
            const v = card.querySelector('video');
            if (v.paused) {
                document.querySelectorAll('video').forEach(vid => { vid.pause(); vid.parentElement.classList.remove('video-moving'); });
                v.play();
                v.onplaying = () => card.classList.add('video-moving');
                v.muted = false;
            } else {
                v.pause(); v.currentTime = 0; card.classList.remove('video-moving');
            }
        }

        function toggleAudio(card) {
            const a = card.querySelector('audio');
            if (a.paused) {
                document.querySelectorAll('audio').forEach(aud => { aud.pause(); aud.parentElement.classList.remove('active-track'); });
                a.play(); card.classList.add('active-track');
            } else { a.pause(); a.currentTime = 0; card.classList.remove('active-track'); }
        }

        // Horizontal Observer to trigger play on swipe
        const obs = new IntersectionObserver(es => es.forEach(e => {
            if (e.isIntersecting) {
                const card = e.target.querySelector('.reel-card');
                if (window.scrollY > 400 && window.scrollY < 1200) toggleVideo(card);
            }
        }), { threshold: 0.8 });
        document.querySelectorAll('.reel-item').forEach(i => obs.observe(i));
    </script>
</body>
</html>
