<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paraglyph | Sound Design</title>
    
    <link rel="preload" href="logo.png" as="image">
    
    <script src="https://cdn.tailwindcss.com" defer></script>

    <style>
        /* --- CRITICAL LOADING CSS --- */
        html, body {
            height: 100%; margin: 0; padding: 0;
            background-color: #0a0a0a; color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        #skeleton-loader {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%); width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            border-radius: 50%; filter: blur(30px);
            animation: skeleton-pulse 1.2s infinite ease-in-out;
            z-index: 999;
        }
        @keyframes skeleton-pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
        }
        #site-wrapper { opacity: 0; transition: opacity 0.6s ease-in-out; visibility: hidden; }
        body.loaded #site-wrapper { opacity: 1; visibility: visible; }
        body.loaded #skeleton-loader { display: none !important; }

        /* --- PAGE 1: FROZEN DESIGN --- */
        .logo-wrapper { position: relative; width: 92vw; max-width: 550px; aspect-ratio: 1/1; z-index: 10; margin: 0 auto; margin-top: 10vh; }
        .logo-image-bg { position: absolute; inset: 0; background: url('logo.png') center/contain no-repeat; z-index: 1; }
        .logo-mask { position: absolute; inset: 0; -webkit-mask: url('logo.png') center/contain no-repeat; mask: url('logo.png') center/contain no-repeat; z-index: 2; }
        .logo-shine-overlay {
            position: absolute; top: 0; width: 120%; height: 100%; 
            background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0) 35%, rgba(255,255,255,0.85) 50%, rgba(255,255,255,0) 65%, transparent 100%);
            transform: skewX(-25deg); animation: zero-park-shine 8s infinite ease-in-out;
        }
        @keyframes zero-park-shine { 0% { left: -150%; } 50% { left: 130%; } 100% { left: -150%; } }
        .hero-content { text-align: center; margin-top: -120px; z-index: 20; width: 100%; }
        .unified-desc { font-size: 11px; color: #9ca3af; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; line-height: 2; white-space: nowrap; }
        .scroll-up-hint {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            opacity: 0.9; z-index: 30; animation: bounce-strong 2s infinite;
        }
        @keyframes bounce-strong {
            0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); filter: brightness(1); }
            40% { transform: translate(-50%, -15px); filter: brightness(1.5); }
            60% { transform: translate(-50%, -7px); }
        }

        /* --- GLOBAL PHYSICS --- */
        body { overflow-y: scroll; scroll-snap-type: y mandatory; }
        section { scroll-snap-align: start; height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; position: relative; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }

        /* --- REELS PHYSICS --- */
        #reels { justify-content: flex-start; padding-top: 5vh; }
        .reels-viewport {
            width: 100%; overflow-x: auto; display: flex;
            scroll-snap-type: x mandatory; scrollbar-width: none;
            padding: 0 45px; gap: 25px; -webkit-overflow-scrolling: touch;
        }
        .reels-viewport::-webkit-scrollbar { display: none; }
        .reel-item { scroll-snap-align: center; flex: 0 0 280px; display: flex; flex-direction: column; align-items: center; }
        .reel-card { width: 280px; aspect-ratio: 9/16; background-color: #111; border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; cursor: pointer; background-size: cover; background-position: center; }
        .reel-card video { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }
        .video-moving video { opacity: 1; }
        
        /* --- BEAT CARD --- */
        .beat-card { display: flex; flex-direction: column; width: 100%; transition: all 0.3s ease; padding: 1.1rem; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; cursor: pointer; }
        .beat-card.active-track { background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.3); }
        audio { width: 100%; filter: invert(100%) brightness(1.5); margin-top: 8px; }
    </style>
</head>
<body>

    <div id="skeleton-loader"></div>

    <div id="site-wrapper">
        <section id="hero">
            <div class="logo-wrapper">
                <div class="logo-image-bg"></div>
                <div class="logo-mask"><div class="logo-shine-overlay"></div></div>
            </div>
            <div class="hero-content">
                <div class="unified-desc" style="margin-bottom: 40px;">
                    <p>From IIT-Bombay to Bomb-ass Beats</p>
                    <p>CRAFTING ORIGINAL SOUNDS WITH</p>
                    <p>WAVETABLE SYNTHESIS</p>
                    <p>LESS SPLICE, MORE SPICE 🔥</p>
                </div>
                <button onclick="scrollToId('reels')" style="background: white; color: black; padding: 15px 40px; border-radius: 50px; font-weight: 900; text-transform: uppercase; font-size: 10px; letter-spacing: 0.2em; border: none; cursor: pointer;">View Reels</button>
            </div>
            <div class="scroll-up-hint">
                <span style="font-size: 10px; font-weight: 900; letter-spacing: 0.4em; text-transform: uppercase;">Swipe Up</span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
            </div>
        </section>

        <section id="reels">
            <h2 class="text-2xl font-bold uppercase tracking-tighter text-gray-500 mb-8 mt-12">Process</h2>
            <div class="reels-viewport" id="reels-list">
                <div class="reel-item">
                    <div class="reel-card" style="background-image:url('Seegrande4Thumbnail.jpg')" onclick="toggleVideo(this)"><video src="Seegrande4.mp4" loop muted playsinline></video></div>
                    <p class="mt-4 text-[10px] font-black uppercase tracking-widest">Seegrande</p>
                </div>
                <div class="reel-item">
                    <div class="reel-card" style="background-image:url('Oseanslo4Thumbnail.jpg')" onclick="toggleVideo(this)"><video src="Oseanslo4.mp4" loop muted playsinline></video></div>
                    <p class="mt-4 text-[10px] font-black uppercase tracking-widest">Oseanslo</p>
                </div>
                <div class="reel-item">
                    <div class="reel-card" style="background-image:url('Glitchuck4Thumbnail.jpg')" onclick="toggleVideo(this)"><video src="Glitchuck4.mp4" loop muted playsinline></video></div>
                    <p class="mt-4 text-[10px] font-black uppercase tracking-widest">Glitchuck</p>
                </div>
            </div>
            <div class="mt-12"><p class="text-gray-600 text-[10px] animate-bounce uppercase tracking-widest">Swipe for more ↓</p></div>
        </section>

        <section id="player" class="justify-center">
            <div class="glass p-6 md:p-10 rounded-[2.5rem] text-center w-[92%] max-w-4xl">
                <h2 class="text-2xl font-bold mb-8 italic underline uppercase text-white">Latest Drops</h2>
                <div class="beat-card mb-3" onclick="handleCardClick(this)">
                    <div class="text-left"><p class="font-bold text-lg text-white">Oseanslo</p><p class="text-xs text-gray-500 uppercase">140 BPM - DARK TRAP</p></div>
                    <audio controls preload="metadata" onplay="handleAudioTrigger(this)"><source src="https://www.dropbox.com/scl/fi/7lvw70kqbjlllw8113o6v/Oseanslo-UK-Drill-With-Hat-Movement-26-feb-26.wav?rlkey=wrak59iy3rbd6adv3u5laalo1&st=6j8ge1zf&raw=1" type="audio/mpeg"></audio>
                </div>
            </div>
        </section>

        <section id="socials" class="justify-center">
            <h2 class="text-4xl font-black mb-12 uppercase tracking-tighter">Connect</h2>
            <div class="flex flex-col space-y-4 w-full max-w-[280px]">
                <a href="https://wa.me/917021539281" target="_blank" class="glass py-5 rounded-2xl text-center font-bold uppercase tracking-widest hover:bg-white hover:text-black transition">WhatsApp</a>
                <a href="https://www.instagram.com/theparaglyph/" target="_blank" class="glass py-5 rounded-2xl text-center font-bold uppercase tracking-widest hover:bg-white hover:text-black transition">Instagram</a>
                <a href="mailto:theparaglyph@gmail.com" class="glass py-5 rounded-2xl text-center font-bold uppercase tracking-widest hover:bg-white hover:text-black transition">Email</a>
            </div>
            <div class="mt-20 text-gray-600 text-[10px] uppercase">© PARAGLYPH 2026</div>
        </section>
    </div>

    <script>
        // --- PERFORMANCE LOAD ---
        const checkImage = setInterval(() => {
            const img = new Image();
            img.src = "logo.png";
            if (img.complete) { document.body.classList.add('loaded'); clearInterval(checkImage); }
        }, 100);
        setTimeout(() => { document.body.classList.add('loaded'); }, 3000);

        // --- GLOBAL SCROLL ---
        function scrollToId(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }

        // --- VIDEO CONTROL ---
        function toggleVideo(card) {
            const v = card.querySelector('video');
            if (v.paused) {
                document.querySelectorAll('video').forEach(vid => { vid.pause(); vid.parentElement.classList.remove('video-moving'); });
                v.play(); card.classList.add('video-moving');
            } else {
                v.pause(); card.classList.remove('video-moving');
            }
        }

        // --- AUDIO CONTROL ---
        function handleCardClick(card) {
            const audio = card.querySelector('audio');
            if (audio.paused) audio.play(); else audio.pause();
        }
        function handleAudioTrigger(audio) {
            document.querySelectorAll('audio').forEach(a => { if(a !== audio) { a.pause(); a.currentTime = 0; } });
            document.querySelectorAll('video').forEach(v => { v.pause(); v.parentElement.classList.remove('video-moving'); });
            document.querySelectorAll('.beat-card').forEach(b => b.classList.remove('active-track'));
            audio.closest('.beat-card').classList.add('active-track');
        }

        // --- AUTO-PAUSE OBSERVER ---
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (!e.isIntersecting) {
                    const v = e.target.querySelector('video');
                    if(v) { v.pause(); e.target.querySelector('.reel-card').classList.remove('video-moving'); }
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reel-item').forEach(i => observer.observe(i));

        // --- HORIZONTAL GESTURE FIX ---
        const reelsView = document.getElementById('reels-list');
        let touchStartX = 0, touchStartY = 0;
        reelsView.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, { passive: true });
        reelsView.addEventListener('touchmove', (e) => {
            let xDiff = touchStartX - e.touches[0].clientX;
            let yDiff = touchStartY - e.touches[0].clientY;
            if (Math.abs(yDiff) > Math.abs(xDiff) + 10) {
                if (yDiff > 50) scrollToId('player');
                if (yDiff < -50) scrollToId('hero');
            }
        }, { passive: true });
    </script>
</body>
</html>
