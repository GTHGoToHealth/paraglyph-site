<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paraglyph | Official Beats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- CORE ARCHITECTURE --- */
        html, body {
            height: 100%; margin: 0; padding: 0;
            background-color: #0a0a0a; color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-snap-type: y mandatory;
        }
        section {
            scroll-snap-align: start; height: 100vh; width: 100vw;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }

        /* --- LOGO FIX --- */
        .logo-wrapper {
            position: relative; width: 75vw; max-width: 400px;
            aspect-ratio: 1/1; margin: 0 auto;
        }
        .logo-image-bg { 
            position: absolute; inset: 0; 
            background: url('logo.png') center/contain no-repeat; z-index: 1; 
        }
        .logo-mask {
            position: absolute; inset: 0;
            -webkit-mask: url('logo.png') center/contain no-repeat;
            mask: url('logo.png') center/contain no-repeat; z-index: 2;
        }
        .logo-shine-overlay {
            position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-25deg); animation: continuous-shine 4s infinite ease-in-out;
        }
        @keyframes continuous-shine { 0% { left: -150%; } 100% { left: 150%; } }

        /* --- REELS: STABLE & AUTO-PLAY --- */
        .reels-viewport {
            width: 100%; overflow-x: auto;
            display: flex; gap: 40px;
            padding: 20px calc(50vw - 140px);
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .reels-viewport::-webkit-scrollbar { display: none; }

        .reel-item { 
            scroll-snap-align: center; flex: 0 0 280px; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .reel-card { 
            width: 280px; aspect-ratio: 9/16; 
            background-color: #000; background-size: cover; background-position: center;
            border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); 
            position: relative; cursor: pointer;
        }

        /* LOADING SPINNER RESTORED */
        .loading-spinner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); 
            border-top: 4px solid #fff; border-radius: 50%;
            display: none; animation: spin 0.8s linear infinite; z-index: 60;
        }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
        .buffering .loading-spinner { display: block; }

        .reel-card video { 
            width: 100%; height: 100%; object-fit: cover; 
            position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s; z-index: 5; 
        }
        .video-moving video { opacity: 1; }

        .video-ui { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.1); z-index: 10; }
        .play-triangle { 
            width: 0; height: 0; border-style: solid; border-width: 18px 0 18px 30px; 
            border-color: transparent transparent transparent rgba(255, 255, 255, 0.6); 
            transition: opacity 0.2s;
        }
        .buffering .play-triangle, .video-moving .play-triangle { opacity: 0; }

        .reel-header { margin-bottom: 12px; text-align: center; }
        .reel-footer { margin-top: 15px; min-height: 70px; text-align: center; width: 280px; }
        
        .reel-popup { 
            font-size: 9px; color: #10b981; font-weight: 800; text-transform: uppercase; 
            background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 8px 12px; border-radius: 10px; line-height: 1.4;
            opacity: 0; transition: opacity 0.4s;
        }
        .video-moving + .reel-footer .reel-popup { opacity: 1; }

        /* ARROWS */
        .swipe-arrow { position: absolute; top: 50%; opacity: 0.3; z-index: 50; pointer-events: none; }
        .arrow-left { left: 10px; animation: pulseL 2s infinite; }
        .arrow-right { right: 10px; animation: pulseR 2s infinite; }
        @keyframes pulseL { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-5px); } }
        @keyframes pulseR { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(5px); } }

        /* --- AUDIO --- */
        .beat-page { display: none; flex-direction: column; gap: 0.75rem; width: 100%; }
        .beat-page.active { display: flex; }
        .beat-card { 
            display: flex; flex-direction: column; width: 100%; 
            transition: all 0.3s ease; filter: brightness(0.85); 
            position: relative; cursor: pointer; padding: 1.25rem;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1.5rem;
        }
        .beat-card.active-track { filter: brightness(1.3); background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.3); }
        .condensed-popup { display: none; font-size: 9px; color: #10b981; font-weight: 800; text-transform: uppercase; margin-top: 10px; text-align: center; animation: popupReveal 0.4s forwards; }
        @keyframes popupReveal { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .active-track .condensed-popup { display: block; }
        audio { width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); margin-top: 10px; }

        @media (min-width: 768px) {
            .beat-card { flex-direction: row; flex-wrap: wrap; justify-content: space-between; align-items: center; }
            .condensed-popup { width: 100%; order: 3; }
            audio { width: 350px; }
            .reel-item { flex: 0 0 320px; }
            .reel-card { width: 320px; }
        }
    </style>
</head>
<body>

    <section>
        <div class="hero-content-block text-center">
            <div class="logo-wrapper">
                <div class="logo-image-bg"></div>
                <div class="logo-mask"><div class="logo-shine-overlay"></div></div>
            </div>
            <div class="bio-text px-6">
                <p class="text-gray-400 text-lg mb-6">Wavetable Synthesis Specialist 🔥</p>
                <button onclick="scrollToId('reels')" class="bg-white text-black px-10 py-4 rounded-full font-bold uppercase tracking-widest text-sm">View Reels</button>
            </div>
        </div>
    </section>

    <section id="reels">
        <div class="swipe-arrow arrow-left"><svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div class="swipe-arrow arrow-right"><svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>
        
        <h2 class="text-2xl font-bold mb-4 uppercase tracking-tighter">Process</h2>
        <div class="reels-viewport" id="reels-list">
            </div>
        <p class="mt-4 text-gray-600 text-[10px] animate-bounce uppercase tracking-[0.2em]">Swipe Left/Right. Up for Music ↑</p>
    </section>

    <section id="player">
        <div class="glass p-6 md:p-10 rounded-[2.5rem] text-center w-[92%] max-w-4xl">
            <h2 class="text-2xl font-bold mb-2 italic underline uppercase text-white">Latest Drops</h2>
            <div id="audio-pages-container">
                <div class="beat-page active" id="page-1">
                    <div class="beat-card" onclick="toggleAudio(this)">
                        <div class="flex-1 text-left"><p class="font-bold text-lg text-white">Oseanslo</p><p class="text-xs text-gray-500 uppercase">140 BPM - Dark Trap</p></div>
                        <audio controls preload="metadata" onclick="event.stopPropagation()"><source src="https://www.dropbox.com/scl/fi/7lvw70kqbjlllw8113o6v/Oseanslo-UK-Drill-With-Hat-Movement-26-feb-26.wav?rlkey=wrak59iy3rbd6adv3u5laalo1&st=6j8ge1zf&raw=1" type="audio/mpeg"></audio>
                        <div class="condensed-popup">⚡ Condensed Arrangement of the full beat: Intro, Drop, Bridge & Switch-ups in short. DM for full beat!</div>
                    </div>
                </div>
            </div>
            <div class="flex justify-center items-center gap-8 mt-6">
                <button onclick="changeAudioPage(1)" class="bg-white/10 px-6 py-3 rounded-xl text-white font-black uppercase text-xs">Back</button>
                <button onclick="changeAudioPage(2)" class="bg-white/10 px-6 py-3 rounded-xl text-white font-black uppercase text-xs">Next</button>
            </div>
        </div>
    </section>

    <section>
        <div class="flex flex-col space-y-4 w-full max-w-[280px]">
            <a href="https://wa.me/917021539281" class="glass py-5 rounded-2xl text-center font-bold uppercase tracking-widest hover:bg-white hover:text-black transition">WhatsApp</a>
            <a href="https://www.instagram.com/theparaglyph/" class="glass py-5 rounded-2xl text-center font-bold uppercase tracking-widest hover:bg-white hover:text-black transition">Instagram</a>
        </div>
    </section>

    <script>
        function scrollToId(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }

        const reelData = [
            { t: 'Oseanslo', d: 'Wavetable Texture', v: 'Oseanslo4.mp4', img: 'Oseanslo4Thumbnail.jpg' },
            { t: 'Seegrande', d: 'Orchestral Trap', v: 'Seegrande4.mp4', img: 'Seegrande4Thumbnail.jpg' },
            { t: 'Glitchuck', d: 'Granular Glitch', v: 'Glitchuck4.mp4', img: 'Glitchuck4Thumbnail.jpg' }
        ];

        const list = document.getElementById('reels-list');
        // Infinite cloning (3x)
        const full = [...reelData, ...reelData, ...reelData];
        
        list.innerHTML = full.map(r => `
            <div class="reel-item">
                <div class="reel-header"><div class="reel-title">${r.t}</div><div class="reel-desc">${r.d}</div></div>
                <div class="reel-card" style="background-image:url('${r.img}')" onclick="toggleVideo(this)">
                    <video src="${r.v}" loop muted playsinline></video>
                    <div class="loading-spinner"></div>
                    <div class="video-ui"><div class="play-triangle"></div></div>
                </div>
                <div class="reel-footer">
                    <div class="reel-popup">⚡ Fast-Load Preview: Audio compressed for performance. Swipe to the next page for higher audio quality.</div>
                </div>
            </div>
        `).join('');

        // SILENT INFINITE SNAP
        list.addEventListener('scroll', () => {
            const itemW = list.querySelector('.reel-item').offsetWidth + 40;
            const setW = itemW * reelData.length;
            if (list.scrollLeft < itemW) list.scrollLeft += setW;
            if (list.scrollLeft > setW * 2) list.scrollLeft -= setW;
        });

        window.onload = () => {
            const itemW = list.querySelector('.reel-item').offsetWidth + 40;
            list.scrollLeft = itemW * reelData.length;
        };

        function toggleVideo(card) {
            const v = card.querySelector('video');
            if (v.paused) {
                document.querySelectorAll('video').forEach(vid => { vid.pause(); vid.currentTime = 0; vid.parentElement.classList.remove('video-moving', 'buffering'); });
                card.classList.add('buffering');
                v.play();
                let check = setInterval(() => {
                    if (v.currentTime > 0.1) {
                        card.classList.remove('buffering');
                        card.classList.add('video-moving');
                        v.muted = false;
                        clearInterval(check);
                    }
                }, 100);
            } else {
                v.pause(); v.currentTime = 0; card.classList.remove('video-moving', 'buffering');
            }
        }

        // AUTO-PLAY OBSERVER
        const obs = new IntersectionObserver(es => es.forEach(e => {
            if (e.isIntersecting) {
                const card = e.target.querySelector('.reel-card');
                // Check if current vertical section is Reels
                const rect = document.getElementById('reels').getBoundingClientRect();
                if (rect.top === 0) toggleVideo(card);
            }
        }), { threshold: 0.85 });
        document.querySelectorAll('.reel-item').forEach(i => obs.observe(i));

        function toggleAudio(card) {
            const a = card.querySelector('audio');
            if (a.paused) {
                document.querySelectorAll('audio').forEach(aud => { aud.pause(); aud.currentTime = 0; aud.parentElement.classList.remove('active-track'); });
                a.play(); card.classList.add('active-track');
            } else { a.pause(); a.currentTime = 0; card.classList.remove('active-track'); }
        }
    </script>
</body>
</html>
