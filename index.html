<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paraglyph | Sound Design</title>
    
    <link rel="preload" href="logo.png" as="image">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- CORE PHYSICS --- */
        html, body {
            height: 100%; margin: 0; padding: 0;
            background-color: #0a0a0a; color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* --- SKELETON & REVEAL LOGIC --- */
        #site-wrapper {
            opacity: 0;
            transition: opacity 0.4s ease-in;
        }

        /* Skeleton: A pulsing glow in the shape of your logo area */
        #skeleton-loader {
            position: absolute;
            top: 42%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            max-width: 400px;
            aspect-ratio: 1/1;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            animation: pulse-skeleton 1.5s infinite ease-in-out;
            z-index: 5;
        }

        @keyframes pulse-skeleton {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.9); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Show content when this class is added */
        body.loaded #site-wrapper { opacity: 1; }
        body.loaded #skeleton-loader { display: none; }

        body { overflow-y: scroll; scroll-snap-type: y mandatory; }
        section {
            scroll-snap-align: start; height: 100vh; width: 100vw;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        /* --- FROZEN LOGO & SHINE --- */
        .logo-wrapper { 
            position: relative; width: 92vw; max-width: 550px; aspect-ratio: 1/1; 
            z-index: 10; margin-top: -15vh; 
        }
        .logo-image-bg { position: absolute; inset: 0; background: url('logo.png') center/contain no-repeat; z-index: 1; }
        .logo-mask { 
            position: absolute; inset: 0; 
            -webkit-mask: url('logo.png') center/contain no-repeat; 
            mask: url('logo.png') center/contain no-repeat; 
            z-index: 2; 
        }
        .logo-shine-overlay {
            position: absolute; top: 0; width: 120%; height: 100%; 
            background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0) 35%, rgba(255,255,255,0.85) 50%, rgba(255,255,255,0) 65%, transparent 100%);
            transform: skewX(-25deg);
            animation: zero-park-shine 8s infinite ease-in-out;
        }
        @keyframes zero-park-shine {
            0% { left: -150%; }
            50% { left: 130%; }
            100% { left: -150%; }
        }

        .hero-content { text-align: center; padding: 0 10px; margin-top: -120px; z-index: 20; width: 100%; }
        .unified-desc { font-size: 0.65rem; color: #9ca3af; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; line-height: 2; white-space: nowrap; }

        .scroll-up-hint {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            opacity: 0.9; z-index: 30; animation: bounce-strong 2s infinite;
        }
        @keyframes bounce-strong {
            0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); filter: brightness(1); }
            40% { transform: translate(-50%, -15px); filter: brightness(1.5); }
            60% { transform: translate(-50%, -7px); }
        }

        /* --- REELS VIEWPORT --- */
        #reels { justify-content: flex-start; padding-top: 5vh; }
        .reels-viewport {
            width: 100%; overflow-x: auto; display: flex;
            scroll-snap-type: x mandatory; scrollbar-width: none;
            padding: 0 45px; gap: 25px; -webkit-overflow-scrolling: touch;
        }
        .reel-item { scroll-snap-align: center; flex: 0 0 280px; display: flex; flex-direction: column; align-items: center; }
        .reel-card { width: 280px; aspect-ratio: 9/16; background-color: #111; border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .reel-card video { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }
        .video-moving video { opacity: 1; }
        .beat-card { background: rgba(255, 255, 255, 0.04); border-radius: 1.5rem; padding: 1.1rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="skeleton-loader"></div>

    <div id="site-wrapper">
        <section id="hero">
            <div class="logo-wrapper">
                <div class="logo-image-bg"></div>
                <div class="logo-mask"><div class="logo-shine-overlay"></div></div>
            </div>
            <div class="hero-content">
                <div class="unified-desc mb-10">
                    <p>From IIT-Bombay to Bomb-ass Beats</p>
                    <p>CRAFTING ORIGINAL SOUNDS WITH</p>
                    <p>WAVETABLE SYNTHESIS</p>
                    <p>LESS SPLICE, MORE SPICE 🔥</p>
                </div>
                <button onclick="scrollToId('reels')" class="bg-white text-black px-10 py-4 rounded-full font-bold uppercase tracking-widest text-xs">View Reels</button>
            </div>
            <div class="scroll-up-hint">
                <span class="text-[10px] font-bold tracking-[0.4em] uppercase text-white">Swipe Up</span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
            </div>
        </section>

        <section id="reels">
            <div class="reels-viewport" id="reels-list">
                <div class="reel-item">
                    <div class="reel-card" style="background-image:url('Seegrande4Thumbnail.jpg')" onclick="toggleVideo(this)"><video src="Seegrande4.mp4" loop muted playsinline></video></div>
                </div>
                <div class="reel-item">
                    <div class="reel-card" style="background-image:url('Oseanslo4Thumbnail.jpg')" onclick="toggleVideo(this)"><video src="Oseanslo4.mp4" loop muted playsinline></video></div>
                </div>
            </div>
        </section>

        <section id="player">
            <div class="glass p-6 md:p-10 rounded-[2.5rem] text-center w-[92%] max-w-4xl">
                <h2 class="text-2xl font-bold mb-6 italic underline uppercase">Latest Drops</h2>
                <div class="beat-card mb-3" onclick="handleCardClick(this)">
                    <p class="font-bold">Oseanslo</p>
                    <audio controls><source src="https://www.dropbox.com/scl/fi/7lvw70kqbjlllw8113o6v/Oseanslo-UK-Drill-With-Hat-Movement-26-feb-26.wav?rlkey=wrak59iy3rbd6adv3u5laalo1&st=6j8ge1zf&raw=1" type="audio/mpeg"></audio>
                </div>
            </div>
        </section>
    </div>

    <script>
        // TRIGGER REVEAL AS SOON AS WINDOW LOADS
        window.onload = function() {
            document.body.classList.add('loaded');
        };

        function scrollToId(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }

        function toggleVideo(card) {
            const v = card.querySelector('video');
            if (v.paused) { 
                v.play(); 
                card.classList.add('video-moving'); 
            } else { 
                v.pause(); 
                card.classList.remove('video-moving'); 
            }
        }

        function handleCardClick(card) {
            const audio = card.querySelector('audio');
            if (audio.paused) audio.play(); else audio.pause();
        }

        const globalObserver = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (!e.isIntersecting) {
                    const v = e.target.querySelector('video');
                    if(v) { v.pause(); e.target.querySelector('.reel-card').classList.remove('video-moving'); }
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reel-item').forEach(i => globalObserver.observe(i));
    </script>
</body>
</html>
