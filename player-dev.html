<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Development - Page 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* --- THE STYLES WE NEED TO REFINE --- */
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .beat-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* The 'Pop' effect when playing */
        .active-track {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(16, 185, 129, 0.4);
            filter: brightness(1.2);
        }

        /* Reacting Subheading Shimmer */
        .subheading-shimmer {
            transition: all 0.3s ease;
        }
        .shimmer-active {
            animation: text-burst 0.6s ease-out;
            color: #10b981;
        }
        @keyframes text-burst {
            0% { transform: scale(1); text-shadow: 0 0 0px #fff; }
            50% { transform: scale(1.05); text-shadow: 0 0 10px rgba(16, 185, 129, 0.8); }
            100% { transform: scale(1); text-shadow: 0 0 0px #fff; }
        }

        /* Emerald Seeker Popup */
        .emerald-popup {
            background: #10b981;
            color: #000;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            margin-top: 8px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            display: inline-block;
        }
        .active-track .emerald-popup {
            opacity: 1;
            transform: translateY(0);
        }

        audio {
            width: 100%;
            filter: invert(100%) brightness(1.5);
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="glass p-6 md:p-10 rounded-[2.5rem] text-center w-[92%] max-w-lg">
        <h2 class="text-2xl font-bold uppercase tracking-tight text-white mb-2">Latest Drops</h2>
        
        <p id="subheading" class="text-[10px] tracking-widest text-gray-500 uppercase mb-8 subheading-shimmer">
            Select a vibe to begin
        </p>

        <div id="beat-list" class="space-y-4">
            </div>

        <div class="flex justify-between mt-8 px-2">
            <button id="prevBtn" class="text-[10px] font-black uppercase tracking-widest disabled:opacity-20">Back</button>
            <button id="nextBtn" class="text-[10px] font-black uppercase tracking-widest disabled:opacity-20">Next</button>
        </div>
    </div>




    
    <script>
     // 1. DATA: Add your 4 audio tracks here
const allBeats = [
    { id: 1, title: 'Oseanslo', bpm: '140', genre: 'Dark Trap', url: 'audio1.mp3' },
    { id: 2, title: 'Seegrande', bpm: '130', genre: 'Orchestral', url: 'audio2.mp3' },
    { id: 3, title: 'Glitchuck', bpm: '150', genre: 'Glitch', url: 'audio3.mp3' },
    { id: 4, title: 'Wavetable', bpm: '128', genre: 'Electronic', url: 'audio4.mp3' }
];

let currentPage = 1;
const beatsPerPage = 3;

// 2. RENDER ENGINE: Handles the 3-per-page logic
function renderBeats() {
    const container = document.getElementById('beat-list');
    container.innerHTML = ''; // Clear previous page

    const start = (currentPage - 1) * beatsPerPage;
    const end = start + beatsPerPage;
    const paginatedBeats = allBeats.slice(start, end);

    paginatedBeats.forEach(beat => {
        const card = document.createElement('div');
        card.className = 'beat-card p-4 rounded-2xl flex flex-col items-center';
        card.onclick = (e) => handleCardClick(e, card);
        
        card.innerHTML = `
            <div class="flex justify-between w-full mb-2 pointer-events-none">
                <div class="text-left">
                    <p class="font-bold text-sm uppercase">${beat.title}</p>
                    <p class="text-[9px] text-gray-500 uppercase">${beat.bpm} BPM • ${beat.genre}</p>
                </div>
            </div>
            <audio controls class="custom-audio" onplay="onAudioPlay(this, '${card}')">
                <source src="${beat.url}" type="audio/mpeg">
            </audio>
            <div class="emerald-popup">Now Playing</div>
        `;
        container.appendChild(card);
    });

    // Update Button States
    document.getElementById('prevBtn').disabled = currentPage === 1;
    document.getElementById('nextBtn').disabled = end >= allBeats.length;
}

// 3. AUDIO LOGIC: Fixes the double-triggering glitch
function handleCardClick(e, card) {
    const audio = card.querySelector('audio');

    // FIX: If user clicks the small triangle (native controls), 
    // stop the card's onclick from firing and causing a double-pause.
    if (e.target.tagName === 'AUDIO') return; 

    if (audio.paused) {
        audio.play();
    } else {
        audio.pause();
    }
}

// 4. EFFECTS: The Emerald Popup & Subheading Shimmer
function onAudioPlay(currentAudio) {
    const card = currentAudio.closest('.beat-card');
    const subheading = document.getElementById('subheading');

    // Reset others
    document.querySelectorAll('audio').forEach(a => {
        if (a !== currentAudio) {
            a.pause();
            a.currentTime = 0;
            a.closest('.beat-card').classList.remove('active-track');
        }
    });

    // Activate Current
    card.classList.add('active-track');
    
    // Trigger Subheading Pop & Shine
    subheading.innerText = `Now Playing: ${card.querySelector('p').innerText}`;
    subheading.classList.remove('shimmer-active');
    void subheading.offsetWidth; // Force reflow for animation restart
    subheading.classList.add('shimmer-active');
}

// 5. PAGINATION CONTROLS
function changePage(direction) {
    // Stop any playing audio before switching pages
    document.querySelectorAll('audio').forEach(a => a.pause());
    
    currentPage += direction;
    renderBeats();
}

document.getElementById('prevBtn').onclick = () => changePage(-1);
document.getElementById('nextBtn').onclick = () => changePage(1);

// Initialize
renderBeats();
    </script>



    
</body>
</html>
